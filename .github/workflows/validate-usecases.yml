name: Validate SOC use cases

on:
  push:
  pull_request:

jobs:
  validate-usecases:
    name: Validate use-case Markdown files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate use-case filenames and required headers
        shell: bash
        run: |
          set -euo pipefail

          required_headers=(
            "Alert name"
            "Objective"
            "Threat scenario"
            "Required data sources"
            "Detection logic"
            "MITRE ATT&CK"
            "Severity"
            "False positive scenarios"
            "Tuning notes"
            "Triage steps"
            "Escalation criteria"
            "Evidence to preserve"
            "Containment and recovery"
            "Lessons learned fields"
          )

          filename_regex='^UC-[A-Z]+-[0-9]{3}-[A-Za-z0-9-]+\.md$'
          status=0

          echo "# Use-case validation summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Filename | Required headers | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"

          if [ ! -d "use-cases" ]; then
            echo "::error::use-cases directory was not found"
            echo "| use-cases/ | Fail | Fail | Missing directory |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # README.md is the generated use-case index, not a use case.
          mapfile -t files < <(find use-cases -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No Markdown use-case files found in use-cases/"
            echo "| use-cases/ | Fail | Fail | No Markdown files found |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          declare -A seen_ids=()

          for file in "${files[@]}"; do
            base_name="$(basename "$file")"
            use_case_id="${base_name%.md}"
            filename_result="Pass"
            headers_result="Pass"
            result="Pass"

            if [[ ! "$base_name" =~ $filename_regex ]]; then
              filename_result="Fail"
              result="Fail"
              status=1
              echo "::error file=$file::Filename does not follow UC-[CATEGORY]-[NNN]-[Description].md"
            fi

            if [[ -n "${seen_ids[$use_case_id]+x}" ]]; then
              filename_result="Fail"
              result="Fail"
              status=1
              echo "::error file=$file::Duplicate use-case ID detected: $use_case_id"
            fi
            seen_ids[$use_case_id]=1

            for header in "${required_headers[@]}"; do
              if ! grep -Eq "^##[[:space:]]+$header[[:space:]]*$" "$file"; then
                headers_result="Fail"
                result="Fail"
                status=1
                echo "::error file=$file::Missing required section header: ## $header"
              fi
            done

            echo "[$result] $file - filename: $filename_result, headers: $headers_result"
            echo "| \`$file\` | $filename_result | $headers_result | $result |" >> "$GITHUB_STEP_SUMMARY"
          done

          exit "$status"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --quiet pyyaml

      - name: Check generated registers are up to date
        run: |
          python scripts/generate_registers.py --check || {
            echo "::error::Generated registers are stale. Run python scripts/generate_registers.py and commit the result."
            exit 1
          }

      - name: Validate embedded KQL and YAML detections
        run: python scripts/validate_detections.py
